<!DOCTYPE html>
<html lang="ru">

<body>
<div class="chat-container">
    ... (хедер, окно чата)
    <div class="input-area">
        <input type="text" id="questionInput" placeholder="Или напишите текст...">
        <button id="sendBtn">Отправить</button>
        <button id="recordBtn">🎤 Записать</button>
    </div>
</div>
<script>
    const API_URL = 'https://d5devpnr02o9anr7lg0j.8wihnuyr.apigw.yandexcloud.net/';
    let mediaRecorder;
    let audioChunks = [];

    const recordBtn = document.getElementById('recordBtn');
    recordBtn.addEventListener('click', async () => {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            recordBtn.textContent = '🎤 Записать';
            return;
        }
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
        mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onloadend = () => {
                const base64Audio = reader.result.split(',')[1];
                sendAudio(base64Audio);
            };
        };
        mediaRecorder.start();
        recordBtn.textContent = '⏹️ Остановить';
    });

    async function sendAudio(base64Audio) {
        addMessage('🎙️ Голосовой запрос...', true);
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ audio_base64: base64Audio })
        });
        const data = await response.json();
        if (data.audio_base64) {
            // Проигрываем полученное аудио
            const audio = new Audio(`data:audio/wav;base64,${data.audio_base64}`);
            audio.play();
            addMessage(data.text, false);
        } else {
            addMessage(data.response || data.error, false);
        }
    }

    // Остальные функции (addMessage, отправка текста) – как раньше
</script>
</body>
</html>
